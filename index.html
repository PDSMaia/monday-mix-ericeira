<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monday Mix in Ericeira</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;}
.app{max-width:980px;margin:0 auto;padding:1.5rem 1rem 4rem;}
.header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;}
.logo{width:42px;height:42px;background:#1D9E75;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-inner{width:22px;height:22px;border:2.5px solid white;border-radius:50%;position:relative;}
.logo-inner::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:2px;background:white;border-radius:2px;}
h1{font-size:20px;font-weight:600;color:#1a1a18;}
.subtitle{font-size:13px;color:#888780;}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e0ded8;margin-bottom:1.5rem;}
.tab{padding:8px 16px;font-size:14px;color:#888780;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;white-space:nowrap;}
.tab:hover{color:#1a1a18;}
.tab.active{color:#0F6E56;border-bottom:2px solid #1D9E75;font-weight:600;}
.section{display:none;}.section.active{display:block;}
.subtabs{display:flex;gap:4px;border-bottom:1px solid #e0ded8;margin-bottom:1.25rem;}
.subtab{padding:6px 14px;font-size:13px;color:#888780;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;}
.subtab:hover{color:#1a1a18;}
.subtab.active{color:#0F6E56;border-bottom:2px solid #1D9E75;font-weight:600;}
.subsection{display:none;}.subsection.active{display:block;}
.card{background:#fff;border:1px solid #e0ded8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
.card-title{font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:12px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
label{font-size:12px;color:#888780;display:block;margin-bottom:4px;}
input[type=text]{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px;background:#fff;color:#1a1a18;outline:none;font-family:inherit;}
input[type=text]:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.15);}
.btn{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#1a1a18;transition:background .12s,transform .1s;font-family:inherit;}
.btn:hover{background:#f0f0ec;}
.btn:active{transform:scale(.97);}
.btn-primary{background:#1D9E75;color:white;border-color:#1D9E75;font-weight:600;}
.btn-primary:hover{background:#0F6E56;border-color:#0F6E56;}
.btn-sm{padding:5px 10px;font-size:12px;}
.jornadas-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.jbtn{padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#888780;transition:all .12s;font-family:inherit;}
.jbtn:hover{background:#f0f0ec;}
.jbtn.sel{background:#1D9E75;color:white;border-color:#1D9E75;font-weight:600;}
.jbtn.done{border-color:#1D9E75;color:#0F6E56;}
.duplas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:600px){.duplas-grid{grid-template-columns:1fr 1fr;}}
.dupla-card{background:#f5f5f3;border-radius:8px;padding:10px 12px;}
.dupla-num{font-size:11px;font-weight:600;color:#0F6E56;margin-bottom:6px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.stat-box{background:#f5f5f3;border-radius:8px;padding:10px 12px;}
.stat-lbl{font-size:12px;color:#888780;margin-bottom:3px;}
.stat-val{font-size:22px;font-weight:600;color:#1a1a18;}
.ronda-block{margin-bottom:1rem;}
.ronda-title{font-size:12px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.partida-card{background:#fff;border:1px solid #e0ded8;border-radius:12px;padding:10px 14px;margin-bottom:8px;}
.partida-top{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.campo-badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;}
.c1{background:#E1F5EE;color:#085041;}.c2{background:#dbeafe;color:#1e3a8a;}.c3{background:#FAEEDA;color:#633806;}
.badge-done{background:#EAF3DE;color:#27500A;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;}
.badge-pending{background:#f0f0ec;color:#5F5E5A;font-size:11px;padding:2px 8px;border-radius:999px;}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.team-left{font-size:12px;font-weight:600;color:#1a1a18;line-height:1.5;}
.team-right{font-size:12px;font-weight:600;color:#1a1a18;line-height:1.5;text-align:right;}
.score-center{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.score-inp{width:34px;padding:4px 2px;text-align:center;border:1px solid #ccc;border-radius:8px;font-size:14px;font-weight:600;background:#fff;color:#1a1a18;outline:none;font-family:inherit;}
.score-inp:focus{border-color:#1D9E75;}
.score-sep{font-size:14px;color:#aaa;}
.partida-footer{display:flex;align-items:center;margin-top:8px;}
.class-table{width:100%;border-collapse:collapse;font-size:13px;}
.class-table th{padding:8px 10px;font-weight:600;color:#888780;border-bottom:1px solid #e0ded8;font-size:12px;text-align:left;}
.class-table th.r{text-align:right;}
.class-table td{padding:10px;border-bottom:1px solid #e0ded8;color:#1a1a18;}
.class-table td.r{text-align:right;}
.class-table tr:last-child td{border-bottom:none;}
.cp1{background:#FAC775;color:#412402;}.cp2{background:#D3D1C7;color:#2C2C2A;}.cp3{background:#F0997B;color:#4A1B0C;}.cpn{background:#f0f0ec;color:#888780;}
.cpos{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.pts-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:600;}
.pts1{background:#FAEEDA;color:#633806;}.pts2{background:#f0f0ec;color:#444441;}.pts3{background:#FAECE7;color:#4A1B0C;}.ptsn{background:#f0f0ec;color:#888780;}
.empty-class{text-align:center;padding:2rem 1rem;color:#888780;font-size:13px;}
.liga-table{width:100%;border-collapse:collapse;font-size:13px;}
.liga-table th{padding:8px 10px;font-weight:600;color:#888780;border-bottom:1px solid #e0ded8;font-size:12px;text-align:left;}
.liga-table th.r{text-align:right;}
.liga-table td{padding:9px 10px;border-bottom:1px solid #e0ded8;color:#1a1a18;}
.liga-table td.r{text-align:right;}
.liga-table tr:last-child td{border-bottom:none;}
.pos-badge{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.p1{background:#FAC775;color:#412402;}.p2{background:#D3D1C7;color:#2C2C2A;}.p3{background:#F0997B;color:#4A1B0C;}.pn{background:#f0f0ec;color:#888780;}
.empty{text-align:center;padding:2.5rem 1rem;color:#888780;font-size:14px;}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.alert-ok{background:#EAF3DE;color:#27500A;border:1px solid #C0DD97;}
.alert-warn{background:#FAEEDA;color:#633806;border:1px solid #FAC775;}
.share-box{background:#f0f0ec;border-radius:8px;padding:10px 12px;margin-top:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.share-url{font-size:11px;color:#888780;word-break:break-all;flex:1;}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="logo"><div class="logo-inner"></div></div>
  <div><h1>Monday Mix in Ericeira</h1><p class="subtitle">Liga · 13 jornadas · Americano · 3 campos</p></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="goTab('jornada',this)">Jornada</button>
  <button class="tab" onclick="goTab('liga',this)">Liga</button>
</div>

<div class="section active" id="tab-jornada">
  <div id="alert-jornada"></div>
  <div class="card">
    <div class="card-header">
      <span class="card-title">Selecionar jornada</span>
      <span id="jornada-status" style="font-size:12px;color:#888780;"></span>
    </div>
    <div class="jornadas-nav" id="jornadas-nav"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
      <button class="btn btn-sm btn-primary" id="btn-share" onclick="shareState()">📤 Gerar link de partilha</button>
      <button class="btn btn-sm" onclick="copyShareUrl()" id="btn-copy" style="display:none;">Copiar link</button>
    </div>
    <div id="share-box" style="display:none;" class="share-box">
      <a id="share-url" href="#" target="_blank" style="font-size:12px;color:#0F6E56;font-weight:600;word-break:break-all;flex:1;"></a>
    </div>
  </div>

  <div id="subtabs-wrap" style="display:none;">
    <div class="subtabs">
      <button class="subtab active" id="st-duplas" onclick="goSub('duplas',this)">Duplas</button>
      <button class="subtab" id="st-partidas" onclick="goSub('partidas',this)">Partidas</button>
      <button class="subtab" id="st-class" onclick="goSub('class',this)">Classificação</button>
    </div>
    <div class="subsection active" id="sub-duplas">
      <div class="card">
        <div class="card-header">
          <span class="card-title" id="duplas-title">Duplas</span>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-sm" id="btn-reset" onclick="resetJornada()" style="display:none;">Redefinir</button>
          </div>
        </div>
        <div id="duplas-content"></div>
      </div>
    </div>
    <div class="subsection" id="sub-partidas">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-lbl">Jogadas</div><div class="stat-val" id="s-jogadas">0</div></div>
        <div class="stat-box"><div class="stat-lbl">Restantes</div><div class="stat-val" id="s-restantes">15</div></div>
        <div class="stat-box"><div class="stat-lbl">Duplas</div><div class="stat-val">6</div></div>
        <div class="stat-box"><div class="stat-lbl">Campos</div><div class="stat-val">3</div></div>
      </div>
      <div id="partidas-container"></div>
    </div>
    <div class="subsection" id="sub-class">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Classificação da jornada</span>
          <span style="font-size:12px;color:#888780;" id="class-subtitle"></span>
        </div>
        <div id="class-content"></div>
        <div id="btn-fechar-wrap" style="margin-top:1rem;"></div>
      </div>
    </div>
  </div>

  <div id="sec-noduplas">
    <div class="card">
      <div class="card-header">
        <span class="card-title" id="duplas-title-init">Duplas</span>
      </div>
      <div id="duplas-content-init"></div>
    </div>
  </div>
</div>

<div class="section" id="tab-liga">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Ranking da liga</span>
      <span style="font-size:12px;color:#888780;">desempate: nº de 1ºs lugares</span>
    </div>
    <div id="liga-ranking"></div>
  </div>
  <div id="liga-detalhe-card" style="display:none;" class="card">
    <div class="card-title">Pontos por jornada</div>
    <div id="liga-detalhe" style="overflow-x:auto;"></div>
  </div>
</div>
</div>

<script>
const CAMPOS=['Campo Powerade (1)','Campo 2','Campo Stella Artois (3)'];
const CAMPO_CLASS=['c1','c2','c3'];
const COLORS=['#1D9E75','#378ADD','#D85A30','#D4537E','#639922','#BA7517'];
const PTS=[9,6,4,3,2,1];
const N=13;

let jornadas=Array.from({length:N},()=>({duplas:null,matches:[],fechada:false,ranking:[]}));
let jAtual=0;
let subAtual='duplas';
let viewOnly=false;

// ── PARTILHA DE ESTADO VIA URL ──
const JSONBIN_KEY='$2a$10$tgFJpUyZC4Q4kKypMvLPQ.EvsQkgzNsw4pUs0VgnXupKfNYT/cgT.';
const JSONBIN_MASTER='$2a$10$tgFJpUyZC4Q4kKypMvLPQ.EvsQkgzNsw4pUs0VgnXupKfNYT/cgT.';

function getState(){
  return {j:jornadas.map(jorn=>({
    d:jorn.duplas?jorn.duplas.map(d=>({p1:d.p1,p2:d.p2})):null,
    m:jorn.matches.map(m=>({id:m.id,d1:m.d1,d2:m.d2,r:m.round,c:m.campo,g1:m.g1,g2:m.g2,done:m.done?1:0})),
    f:jorn.fechada?1:0,
    rk:jorn.ranking.map(r=>({di:r.dupIdx,p:r.pos}))
  })),ja:jAtual};
}

function shareState(){
  const btn=document.getElementById('btn-share');
  btn.textContent='A gerar link...';btn.disabled=true;
  const state=getState();
  fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Private':'false'},
    body:JSON.stringify(state)
  })
  .then(r=>r.json())
  .then(data=>{
    const id=data.metadata&&data.metadata.id;
    if(!id) throw new Error('no id');
    const url=window.location.href.split('?')[0]+'?b='+id;
    const el=document.getElementById('share-url');
    el.textContent=url;el.href=url;
    document.getElementById('share-box').style.display='flex';
    document.getElementById('btn-copy').style.display='';
    btn.textContent='📤 Gerar link de partilha';btn.disabled=false;
  })
  .catch(()=>{
    const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(state))));
    const url=window.location.href.split('?')[0]+'?s='+encoded;
    const el=document.getElementById('share-url');
    el.textContent=url;el.href=url;
    document.getElementById('share-box').style.display='flex';
    document.getElementById('btn-copy').style.display='';
    btn.textContent='📤 Gerar link de partilha';btn.disabled=false;
  });
}

function copyShareUrl(){
  const url=document.getElementById('share-url').textContent;
  navigator.clipboard.writeText(url).then(()=>{
    document.getElementById('btn-copy').textContent='Copiado!';
    setTimeout(()=>document.getElementById('btn-copy').textContent='Copiar link',2000);
  });
}

function applyState(state){
  jAtual=state.ja||0;
  jornadas=state.j.map((jd)=>({
    duplas:jd.d?jd.d.map((d,i)=>({p1:d.p1,p2:d.p2,color:COLORS[i]})):null,
    matches:jd.m.map(m=>({id:m.id,d1:m.d1,d2:m.d2,round:m.r,campo:m.c,g1:m.g1,g2:m.g2,done:!!m.done})),
    fechada:!!jd.f,
    ranking:jd.rk.map(r=>({dupIdx:r.di,pos:r.p}))
  }));
}

function loadFromUrl(){
  const params=new URLSearchParams(window.location.search);
  const b=params.get('b');
  const s=params.get('s');
  if(b){
    viewOnly=true;
    fetch('https://api.jsonbin.io/v3/b/'+b+'/latest',{
      headers:{'X-Master-Key':JSONBIN_KEY}
    })
    .then(r=>r.json())
    .then(data=>{
      applyState(data.record);
      renderNav();renderJornada();
    })
    .catch(()=>{});
    return true;
  }
  if(s){
    try{applyState(JSON.parse(decodeURIComponent(escape(atob(s)))));return true;}catch(e){return false;}
  }
  return false;
}

function goTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='jornada') renderJornada();
  if(id==='liga') renderLiga();
}

function goSub(id,el){
  subAtual=id;
  document.querySelectorAll('.subsection').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.subtab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sub-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='partidas') renderPartidas();
  if(id==='class') renderClassJornada();
}

function renderNav(){
  document.getElementById('jornadas-nav').innerHTML=Array.from({length:N},(_,i)=>{
    const cl=i===jAtual?'sel':jornadas[i].fechada?'done':'';
    return `<button class="jbtn ${cl}" onclick="selectJ(${i})">${i+1}</button>`;
  }).join('');
  const feitas=jornadas.filter(j=>j.fechada).length;
  document.getElementById('jornada-status').textContent=`Jornada ${jAtual+1} · ${feitas} de ${N} concluídas`;
}

function selectJ(i){jAtual=i;subAtual='duplas';renderJornada();}

function renderJornada(){
  renderNav();
  const jorn=jornadas[jAtual];
  if(!jorn.duplas){
    document.getElementById('subtabs-wrap').style.display='none';
    document.getElementById('sec-noduplas').style.display='block';
    document.getElementById('duplas-title-init').textContent=`Duplas — Jornada ${jAtual+1}`;
    if(viewOnly){
      document.getElementById('duplas-content-init').innerHTML='<div style="padding:1rem;color:#888780;font-size:13px;">Esta jornada ainda não tem duplas registadas.</div>';
    } else {
      renderDuplasForm('duplas-content-init');
    }
  } else {
    document.getElementById('sec-noduplas').style.display='none';
    document.getElementById('subtabs-wrap').style.display='block';
    document.getElementById('duplas-title').textContent=`Duplas — Jornada ${jAtual+1}`;
    document.getElementById('btn-reset').style.display=(jorn.fechada||viewOnly)?'none':'';
    document.querySelectorAll('.subsection').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.subtab').forEach(t=>t.classList.remove('active'));
    document.getElementById('sub-'+subAtual).classList.add('active');
    document.getElementById('st-'+subAtual).classList.add('active');
    if(subAtual==='duplas') renderDuplasReadonly();
    if(subAtual==='partidas') renderPartidas();
    if(subAtual==='class') renderClassJornada();
  }
}

function renderDuplasForm(cid){
  document.getElementById(cid).innerHTML=`
    <div class="duplas-grid">
      ${Array.from({length:6},(_,i)=>`
        <div class="dupla-card">
          <div class="dupla-num"><span class="dot" style="background:${COLORS[i]};margin-right:5px;"></span>Dupla ${i+1}</div>
          <label>Jogador A</label><input type="text" id="dp${i}a" placeholder="Nome" style="margin-bottom:6px;"/>
          <label>Jogador B</label><input type="text" id="dp${i}b" placeholder="Nome"/>
        </div>`).join('')}
    </div>
    <div style="margin-top:1rem;">
      <button class="btn btn-primary" onclick="saveDuplas()">Confirmar duplas e gerar partidas</button>
    </div>`;
}

function renderDuplasReadonly(){
  const jorn=jornadas[jAtual];
  document.getElementById('duplas-content').innerHTML=`
    <div class="duplas-grid">
      ${jorn.duplas.map((d,i)=>`
        <div class="dupla-card">
          <div class="dupla-num"><span class="dot" style="background:${d.color};margin-right:5px;"></span>Dupla ${i+1}</div>
          <div style="font-size:13px;color:#1a1a18;line-height:1.7;">${d.p1}<br>${d.p2}</div>
        </div>`).join('')}
    </div>`;
}

function saveDuplas(){
  const duplas=[];
  for(let i=0;i<6;i++){
    const p1=(document.getElementById('dp'+i+'a')||{}).value?.trim();
    const p2=(document.getElementById('dp'+i+'b')||{}).value?.trim();
    if(!p1||!p2){showAlert('Preenche os dois jogadores de todas as duplas.','warn');return;}
    duplas.push({p1,p2,color:COLORS[i]});
  }
  jornadas[jAtual].duplas=duplas;
  jornadas[jAtual].matches=genMatches();
  subAtual='partidas';
  renderJornada();
}

function resetJornada(){
  if(!confirm('Apagar as partidas desta jornada e redefinir duplas?')) return;
  jornadas[jAtual]={duplas:null,matches:[],fechada:false,ranking:[]};
  subAtual='duplas';renderJornada();
}

function buildPairs(){
  const rot=[1,2,3,4,5];const rounds=[];
  for(let r=0;r<5;r++){
    const c=[0,...rot];const round=[];
    for(let i=0;i<3;i++) round.push([Math.min(c[i],c[5-i]),Math.max(c[i],c[5-i])]);
    rounds.push(round);rot.unshift(rot.pop());
  }
  return rounds;
}
function assignFields(rounds){
  const cc=Array.from({length:6},()=>[0,0,0]);
  return rounds.map(round=>{
    const perms=[[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]];
    let best=perms[0],bs=Infinity;
    for(const p of perms){let s=0;round.forEach(([a,b],i)=>{const c=p[i];s+=cc[a][c]*cc[a][c]+cc[b][c]*cc[b][c];});if(s<bs){bs=s;best=p;}}
    round.forEach(([a,b],i)=>{const c=best[i];cc[a][c]++;cc[b][c]++;});
    return round.map(([a,b],i)=>({d1:a,d2:b,campo:best[i]}));
  });
}
function genMatches(){
  const ms=[];
  assignFields(buildPairs()).forEach((round,ri)=>{
    round.forEach(({d1,d2,campo})=>ms.push({id:ms.length,d1,d2,round:ri+1,campo,g1:'',g2:'',done:false}));
  });
  return ms;
}

function renderPartidas(){
  const jorn=jornadas[jAtual];
  const done=jorn.matches.filter(m=>m.done).length;
  document.getElementById('s-jogadas').textContent=done;
  document.getElementById('s-restantes').textContent=15-done;
  document.getElementById('partidas-container').innerHTML=[1,2,3,4,5].map(r=>{
    const rm=jorn.matches.filter(m=>m.round===r).sort((a,b)=>a.campo-b.campo);
    return `<div class="ronda-block"><div class="ronda-title">Ronda ${r}</div>${rm.map(m=>pCard(m,jorn)).join('')}</div>`;
  }).join('');
}

function pCard(m,jorn){
  const d1=jorn.duplas[m.d1],d2=jorn.duplas[m.d2];
  const badge=m.done?'<span class="badge-done">Concluída</span>':'<span class="badge-pending">Pendente</span>';
  const dis=(jorn.fechada||viewOnly)?'disabled':'';
  return `<div class="partida-card">
    <div class="partida-top"><span class="campo-badge ${CAMPO_CLASS[m.campo]}">${CAMPOS[m.campo]}</span>${badge}</div>
    <div class="match-row">
      <div class="team-left"><span class="dot" style="background:${d1.color};margin-right:4px;"></span>${d1.p1}<br><span style="display:inline-block;width:13px;"></span>${d1.p2}</div>
      <div class="score-center">
        <input type="text" class="score-inp" id="g${m.id}a" value="${m.g1}" placeholder="0" oninput="setScore(${m.id},1,this.value)" ${dis}/>
        <span class="score-sep">–</span>
        <input type="text" class="score-inp" id="g${m.id}b" value="${m.g2}" placeholder="0" oninput="setScore(${m.id},2,this.value)" ${dis}/>
      </div>
      <div class="team-right">${d2.p1}<span class="dot" style="background:${d2.color};margin-left:4px;"></span><br>${d2.p2}</div>
    </div>
    <div class="partida-footer">
      <span style="font-size:11px;color:#888780;">jogos ganhos por dupla</span>
      ${(!jorn.fechada&&!viewOnly)?`<button class="btn btn-primary btn-sm" style="margin-left:auto;" onclick="registar(${m.id})">Registar</button>`:''}
    </div>
  </div>`;
}

function setScore(id,t,v){const m=jornadas[jAtual].matches.find(m=>m.id===id);if(m){if(t===1)m.g1=v;else m.g2=v;}}

function registar(id){
  const jorn=jornadas[jAtual];
  const m=jorn.matches.find(m=>m.id===id);
  m.g1=parseInt(document.getElementById('g'+id+'a').value)||0;
  m.g2=parseInt(document.getElementById('g'+id+'b').value)||0;
  m.done=true;
  renderPartidas();
}

function calcClass(jorn){
  const st=jorn.duplas.map((_,i)=>({idx:i,pw:0,pl:0,gw:0,gl:0}));
  jorn.matches.filter(m=>m.done).forEach(m=>{
    const g1=parseInt(m.g1)||0,g2=parseInt(m.g2)||0;
    st[m.d1].gw+=g1;st[m.d1].gl+=g2;st[m.d2].gw+=g2;st[m.d2].gl+=g1;
    if(g1>g2){st[m.d1].pw++;st[m.d2].pl++;}else if(g2>g1){st[m.d2].pw++;st[m.d1].pl++;}
  });
  function compareWithDirect(a,b,all){
    if(b.pw!==a.pw) return b.pw-a.pw;
    const da=a.gw-a.gl,db=b.gw-b.gl;
    if(db!==da) return db-da;
    const tied=all.filter(s=>s.pw===a.pw&&(s.gw-s.gl)===da);
    if(tied.length>=2){
      const groupIdxs=tied.map(s=>s.idx);
      const mini={};groupIdxs.forEach(i=>mini[i]={pw:0,gw:0,gl:0});
      jorn.matches.filter(m=>m.done&&groupIdxs.includes(m.d1)&&groupIdxs.includes(m.d2)).forEach(m=>{
        const g1=parseInt(m.g1)||0,g2=parseInt(m.g2)||0;
        mini[m.d1].gw+=g1;mini[m.d1].gl+=g2;mini[m.d2].gw+=g2;mini[m.d2].gl+=g1;
        if(g1>g2)mini[m.d1].pw++;else if(g2>g1)mini[m.d2].pw++;
      });
      const ma=mini[a.idx],mb=mini[b.idx];
      if(ma&&mb){
        if(mb.pw!==ma.pw) return mb.pw-ma.pw;
        const mdA=ma.gw-ma.gl,mdB=mb.gw-mb.gl;
        if(mdB!==mdA) return mdB-mdA;
      }
    }
    return 0;
  }
  st.sort((a,b)=>compareWithDirect(a,b,st));
  return st;
}

function renderClassJornada(){
  const jorn=jornadas[jAtual];
  const done=jorn.matches.filter(m=>m.done).length;
  document.getElementById('class-subtitle').textContent=`${done} de ${jorn.matches.length} partidas jogadas`;
  if(!done){
    document.getElementById('class-content').innerHTML='<div class="empty-class">Regista resultados nas Partidas para ver a classificação.</div>';
    document.getElementById('btn-fechar-wrap').innerHTML='';return;
  }
  const st=calcClass(jorn);
  const posCls=['cp1','cp2','cp3','cpn','cpn','cpn'];
  const ptsCls=['pts1','pts2','pts3','ptsn','ptsn','ptsn'];
  document.getElementById('class-content').innerHTML=`
    <table class="class-table">
      <thead><tr><th>#</th><th>Dupla</th><th class="r">PG</th><th class="r">PP</th><th class="r">JG</th><th class="r">JL</th><th class="r">Dif.</th><th class="r">Pts liga</th></tr></thead>
      <tbody>${st.map((s,i)=>{
        const d=jorn.duplas[s.idx];const dif=s.gw-s.gl;
        return `<tr>
          <td><span class="cpos ${posCls[i]}">${i+1}</span></td>
          <td><div style="display:flex;align-items:center;gap:6px;"><span class="dot" style="background:${d.color};"></span><div style="line-height:1.4;"><div style="font-weight:600;">${d.p1}</div><div style="font-size:11px;color:#888780;">${d.p2}</div></div></div></td>
          <td class="r" style="font-weight:600;color:#0F6E56;">${s.pw}</td><td class="r">${s.pl}</td>
          <td class="r">${s.gw}</td><td class="r">${s.gl}</td>
          <td class="r" style="color:${dif>=0?'#0F6E56':'#E24B4A'};font-weight:600;">${dif>=0?'+':''}${dif}</td>
          <td class="r"><span class="pts-badge ${ptsCls[i]}">${PTS[i]||0} pts</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table>
    <div style="margin-top:8px;font-size:11px;color:#888780;">Desempate: 1º partidas ganhas · 2º dif. jogos · 3º confronto direto</div>`;
  const wrap=document.getElementById('btn-fechar-wrap');
  if(jorn.fechada){
    wrap.innerHTML='<p style="font-size:13px;color:#27500A;background:#EAF3DE;padding:8px 12px;border-radius:8px;">Jornada fechada — pontos registados na liga.</p>';
  } else if(!viewOnly){
    wrap.innerHTML='<button class="btn btn-primary" onclick="fecharJornada()">Fechar jornada e registar pontos na liga</button>';
  } else {
    wrap.innerHTML='';
  }
}

function fecharJornada(){
  const jorn=jornadas[jAtual];if(jorn.fechada)return;
  const st=calcClass(jorn);
  jorn.ranking=st.map((s,i)=>({dupIdx:s.idx,pos:i}));
  jorn.fechada=true;
  renderNav();renderClassJornada();renderPartidas();
  showAlert(`Jornada ${jAtual+1} fechada! Pontos registados na liga.`,'ok');
}

function calcLiga(){
  const map={};
  jornadas.forEach((jorn,ji)=>{
    if(!jorn.fechada||!jorn.ranking.length)return;
    jorn.ranking.forEach(({dupIdx,pos})=>{
      const d=jorn.duplas[dupIdx];const pts=PTS[pos]||0;
      [d.p1,d.p2].forEach(nome=>{
        const key=nome.trim().toLowerCase();
        if(!map[key])map[key]={nome:nome.trim(),pts:0,primeiros:0,jPts:Array(N).fill(null)};
        map[key].pts+=pts;if(pos===0)map[key].primeiros++;
        map[key].jPts[ji]=(map[key].jPts[ji]||0)+pts;
      });
    });
  });
  return Object.values(map).sort((a,b)=>b.pts-a.pts||b.primeiros-a.primeiros);
}

function renderLiga(){
  const data=calcLiga();
  const fechadas=jornadas.map((j,i)=>j.fechada?i:-1).filter(i=>i>=0);
  const lig=document.getElementById('liga-ranking');
  if(!data.length){
    lig.innerHTML='<div class="empty">Fecha pelo menos uma jornada para ver o ranking.</div>';
    document.getElementById('liga-detalhe-card').style.display='none';return;
  }
  const pc=i=>['p1','p2','p3'][i]||'pn';
  lig.innerHTML=`<table class="liga-table">
    <thead><tr><th>#</th><th>Jogador</th><th class="r">Pontos</th><th class="r">1ºs lugares</th><th class="r">Jornadas</th></tr></thead>
    <tbody>${data.map((j,i)=>`<tr>
      <td><span class="pos-badge ${pc(i)}">${i+1}</span></td>
      <td style="font-weight:600;">${j.nome}</td>
      <td class="r" style="font-weight:600;color:#0F6E56;font-size:15px;">${j.pts}</td>
      <td class="r">${j.primeiros}</td>
      <td class="r">${j.jPts.filter(p=>p!==null).length}</td>
    </tr>`).join('')}</tbody>
  </table>`;
  document.getElementById('liga-detalhe-card').style.display='block';
  document.getElementById('liga-detalhe').innerHTML=`
    <table class="liga-table" style="font-size:12px;">
      <thead><tr><th>Jogador</th>${fechadas.map(i=>`<th class="r" style="font-size:11px;min-width:28px;">J${i+1}</th>`).join('')}<th class="r">Total</th></tr></thead>
      <tbody>${data.map(j=>`<tr>
        <td style="font-weight:600;white-space:nowrap;">${j.nome}</td>
        ${fechadas.map(i=>{const p=j.jPts[i];return `<td class="r" style="color:${p===9?'#0F6E56':p===null?'#ccc':'#888780'};">${p!==null?p:'–'}</td>`;}).join('')}
        <td class="r" style="font-weight:600;color:#0F6E56;">${j.pts}</td>
      </tr>`).join('')}</tbody>
    </table>`;
}

function showAlert(msg,type){
  const el=document.getElementById('alert-jornada');
  el.className='alert alert-'+type;el.textContent=msg;
  setTimeout(()=>{el.textContent='';el.className='';},5000);
}

// arranque
loadFromUrl();
if(viewOnly){
  document.getElementById('btn-share').style.display='none';
  document.getElementById('btn-copy').style.display='none';
  const banner=document.createElement('div');
  banner.style.cssText='background:#E6F1FB;color:#0C447C;border:1px solid #B5D4F4;border-radius:8px;padding:8px 12px;font-size:12px;margin-top:8px;';
  banner.textContent='👁 Modo visualização — só leitura';
  document.getElementById('share-box').parentNode.appendChild(banner);
}
renderNav();
renderJornada();
</script>
